# Smart Agent Configuration

# AI Backend Selection: 'ollama' or 'gemini'
ai_backend: "gemini"

# Ollama Configuration (when ai_backend is 'ollama')
ollama:
  host: "http://localhost:11434"
  model: "glm-4.7-flash"  # Using available model
  temperature: 0.7
  max_tokens: 500

# Gemini Configuration (when ai_backend is 'gemini')
gemini:
  api_key: "YOUR_GEMINI_API_KEY"
  model: "gemini-1.5-flash"
  temperature: 0.7
  max_tokens: 500

# Voice Configuration
voice:
  sample_rate: 16000
  chunk_size: 1024
  energy_threshold: 1000
  silence_timeout: 3

# Display Configuration
display:
  width: 466
  height: 466
  rotation: 0
  brightness: 255

# Audio Output
output:
  device: "default"
  volume: 1.0
  sample_rate: 24000

# Application
app:
  name: "SmartAgent"
  version: "1.0.0"
  log_level: "INFO"